<!doctype html>
<html lang="pt-BR" data-page="teste">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste — TTB Lineup</title>
    <link rel="stylesheet" href="styles.css?v=16" />
    <script src="auth.js?v=4"></script>
    <script>checkAuth();</script>
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Controles do teste">
        <div>
          <p class="eyebrow">Baseball Lineup</p>
          <h1>Treino</h1>
        </div>

        <div class="toolbar-center">
          <nav class="tab-nav" aria-label="Abas">
            <a class="tab-btn" href="index.html">Lineup</a>
            <a class="tab-btn" href="status.html">Status</a>
            <a class="tab-btn tab-btn-teste is-active" href="teste.html">Teste</a>
            <a class="tab-btn" href="stats.html">Stats</a>
          </nav>
        </div>

        <div class="toolbar-actions">
          <button class="btn-logout" type="button">Sair</button>
        </div>
      </section>

      <section id="testeTab" class="teste-view">
        <div class="teste-mode-tabs" aria-label="Modos de teste">
          <button id="testeTreinoTab" class="teste-mode-tab is-active" type="button">Treino</button>
          <button id="testeSoftballTab" class="teste-mode-tab" type="button">Softball At-Bat</button>
        </div>

        <div id="testeTreinoPanel" class="teste-mode-panel">
        <div class="teste-setup">
          <div class="teste-setup-fields">
            <div class="teste-field-group">
              <label class="teste-label" for="testePitcherInput">Pitcher</label>
              <input id="testePitcherInput" class="teste-input" placeholder="Nome do pitcher..." />
            </div>
            <div class="teste-field-group" style="flex:1">
              <label class="teste-label" for="testeBatterInput">Adicionar rebatedor</label>
              <div class="teste-add-row">
                <input id="testeBatterInput" class="teste-input" placeholder="Nome do rebatedor..." />
                <button id="testeAddBatter" class="ctrl-btn">+ Adicionar</button>
              </div>
            </div>
          </div>
          <div class="teste-setup-actions">
            <button id="testeResetAll" class="ctrl-btn ctrl-reset">Resetar tudo</button>
            <button id="testeSalvar" class="ctrl-btn ctrl-salvar">Salvar Treino</button>
          </div>
        </div>
        <div id="testeToast" class="teste-toast"></div>

        <div class="teste-main">

          <!-- Batter list -->
          <div class="teste-batters-panel">
            <h3 class="teste-section-title">Rebatedores</h3>
            <ul id="testeBatterList" class="teste-batter-list"></ul>
          </div>

          <!-- At-bat controls + strike zone -->
          <div class="teste-center-panel">
            <div class="teste-atbat-header">
              <span id="testeCurrentName" class="teste-current-name">— selecione um rebatedor —</span>
              <span id="testeCurrentCount" class="teste-current-count">B: 0 · S: 0</span>
            </div>

            <div class="teste-atbat-actions">
              <button id="testeHit"        class="atbat-btn atbat-hit">Hit ✔</button>
              <button id="testeOut"        class="atbat-btn atbat-out">Out</button>
              <button id="testeBall"       class="atbat-btn atbat-ball">Ball</button>
              <button id="testeStrike"     class="atbat-btn atbat-strike">Strike</button>
              <button id="testeUndo"       class="atbat-btn atbat-undo">↩ Desfazer</button>
              <button id="testeNextBatter" class="atbat-btn atbat-next">Próx. ›</button>
            </div>

            <div class="pitch-area" style="margin-top:8px">
              <div class="pitch-area-label">Zona — clique para registrar arremesso</div>
              <div class="pitch-zone-wrapper" id="testePitchWrapper">
                <div class="pitch-zone-box" id="testePitchBox" aria-hidden="true">
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                  <span class="pitch-zone-cell"></span>
                </div>
                <div class="pitch-dots" id="testePitchDots"></div>
              </div>
            </div>
          </div>

          <!-- Live stats table -->
          <div class="teste-stats-panel">
            <h3 class="teste-section-title">Estatísticas ao vivo</h3>
            <table class="teste-stats-table">
              <thead>
                <tr>
                  <th>Rebatedor</th>
                  <th>AB</th>
                  <th>H</th>
                  <th>BB</th>
                  <th>K</th>
                  <th>AVG</th>
                </tr>
              </thead>
              <tbody id="testeStatsBody"></tbody>
            </table>

            <div id="testeLeaderboard" class="teste-leaderboard" hidden>
              <h3 class="teste-section-title" style="margin-top:16px">🏆 Melhor AVG</h3>
              <div id="testeLeaderboardContent"></div>
            </div>
          </div>

        </div>
        </div>

        <div id="testeSoftballPanel" class="teste-mode-panel" hidden>
          <div class="softball-layout">
            <section class="softball-card">
              <h3 class="teste-section-title">At-bat de Softball</h3>
              <div class="softball-form">
                <label class="teste-field-group">
                  <span class="teste-label">Rebatedora</span>
                  <input id="softballBatter" class="teste-input" placeholder="Nome..." />
                </label>
                <label class="teste-field-group">
                  <span class="teste-label">Pitcher</span>
                  <input id="softballPitcher" class="teste-input" placeholder="Pitcher..." />
                </label>
                <label class="teste-field-group">
                  <span class="teste-label">Inning</span>
                  <input id="softballInning" class="teste-input" type="number" min="1" value="1" />
                </label>
                <label class="teste-field-group">
                  <span class="teste-label">Contagem</span>
                  <div class="softball-count-row">
                    <input id="softballBalls" class="teste-input" type="number" min="0" max="4" value="0" aria-label="Balls" />
                    <input id="softballStrikes" class="teste-input" type="number" min="0" max="3" value="0" aria-label="Strikes" />
                  </div>
                </label>
                <label class="teste-field-group">
                  <span class="teste-label">Resultado</span>
                  <select id="softballResult" class="teste-input">
                    <option value="1B">Single</option>
                    <option value="2B">Double</option>
                    <option value="3B">Triple</option>
                    <option value="HR">Home run</option>
                    <option value="BB">Walk</option>
                    <option value="K">Strikeout</option>
                    <option value="OUT">Out</option>
                    <option value="FC">Fielder choice</option>
                    <option value="ROE">Erro</option>
                    <option value="SAC">Sacrifice</option>
                  </select>
                </label>
                <label class="teste-field-group">
                  <span class="teste-label">Contato</span>
                  <select id="softballContact" class="teste-input">
                    <option value="">Opcional</option>
                    <option value="ground">Ground ball</option>
                    <option value="line">Line drive</option>
                    <option value="fly">Fly ball</option>
                    <option value="pop">Pop up</option>
                    <option value="bunt">Bunt</option>
                  </select>
                </label>
                <label class="teste-field-group">
                  <span class="teste-label">Direcao</span>
                  <select id="softballDirection" class="teste-input">
                    <option value="">Opcional</option>
                    <option value="LF">Left</option>
                    <option value="LC">Left-center</option>
                    <option value="CF">Center</option>
                    <option value="RC">Right-center</option>
                    <option value="RF">Right</option>
                    <option value="INF">Infield</option>
                  </select>
                </label>
                <label class="teste-field-group">
                  <span class="teste-label">RBI</span>
                  <input id="softballRbi" class="teste-input" type="number" min="0" value="0" />
                </label>
                <label class="teste-field-group softball-notes">
                  <span class="teste-label">Observacao</span>
                  <textarea id="softballNotes" class="softball-textarea" placeholder="Ex: contato forte no campo oposto..."></textarea>
                </label>
              </div>
              <div class="softball-actions">
                <button id="softballSave" class="ctrl-btn ctrl-salvar">Salvar At-Bat</button>
                <button id="softballClear" class="ctrl-btn ctrl-reset">Limpar formulario</button>
              </div>
            </section>

            <section class="softball-card">
              <div class="softball-history-heading">
                <h3 class="teste-section-title">Dados salvos</h3>
                <button id="softballClearHistory" class="ctrl-btn ctrl-reset">Apagar tudo</button>
              </div>
              <div id="softballSummary" class="softball-summary"></div>
              <div id="softballHistory" class="softball-history"></div>
            </section>
          </div>
        </div>
      </section>

      <section id="testeHistoricoView" class="historico-view">
        <h2 class="historico-title">Histórico de Treinos</h2>
        <div id="testeHistorico"></div>
      </section>
    </main>

    <script src="lineup-data.js?v=4"></script>
    <script src="app.js?v=16"></script>
    <script src="supabase.js?v=4"></script>
  </body>
</html>
