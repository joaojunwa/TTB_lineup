<!doctype html>
<html lang="pt-BR" data-page="stats">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stats — TTB Lineup</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js?v=4"></script>
    <script>checkAuth();</script>
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Controles de stats">
        <div>
          <p class="eyebrow">Baseball Lineup</p>
          <h1>Stats</h1>
        </div>

        <div class="toolbar-center">
          <nav class="tab-nav" aria-label="Abas">
            <a class="tab-btn" href="index.html">Lineup</a>
            <a class="tab-btn" href="status.html">Status</a>
            <a class="tab-btn tab-btn-teste" href="teste.html">Teste</a>
            <a class="tab-btn is-active" href="stats.html">Stats</a>
          </nav>
        </div>

        <div class="toolbar-actions">
          <button class="btn-logout" type="button">Sair</button>
        </div>
      </section>

      <section id="statsTab" class="stats-view">
        <div class="stats-toolbar">
          <input
            id="statsSearch"
            class="stats-search"
            type="search"
            placeholder="Buscar jogador..."
            autocomplete="off"
          />
          <label class="stats-sort-label">
            Ordenar por:
            <select id="statsSort" class="stats-sort-select">
              <option value="name">Nome</option>
              <option value="avg" selected>AVG</option>
              <option value="hits">Hits</option>
              <option value="ab">AB</option>
            </select>
          </label>
        </div>

        <div class="stats-table-wrap">
          <table class="stats-table" id="statsTable">
            <thead>
              <tr>
                <th class="stats-th-player">Jogador</th>
                <th class="stats-th-num" title="At-Bats — número de vezes que foi rebater">AB</th>
                <th class="stats-th-num" title="Hits — acertos">H</th>
                <th class="stats-th-avg" title="Batting Average — média de rebatidas (H ÷ AB)">AVG</th>
              </tr>
            </thead>
            <tbody id="statsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="lineup-data.js?v=4"></script>
    <script src="app.js?v=4"></script>
    <script src="stats.js?v=1"></script>
  </body>
</html>
