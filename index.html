<!doctype html>
<html lang="pt-BR" data-page="lineup">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Lineup de Baseball</title>
    <link rel="stylesheet" href="styles.css?v=5" />
    <script src="auth.js?v=4"></script>
    <script>checkAuth();</script>
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Controles do lineup">
        <div>
          <p class="eyebrow">Baseball Lineup</p>
          <h1>Lineup do jogo</h1>
        </div>

        <div class="toolbar-center">
          <nav class="tab-nav" aria-label="Abas">
            <a class="tab-btn is-active" href="index.html">Lineup</a>
            <a class="tab-btn" href="status.html">Status</a>
            <a class="tab-btn tab-btn-teste" href="teste.html">Teste</a>
            <a class="tab-btn" href="stats.html">Stats</a>
          </nav>
        </div>

        <div class="toolbar-actions">
          <button class="btn-logout" type="button">Sair</button>
          <button id="drawerToggle" type="button" aria-controls="lineupPanel" aria-expanded="false">
            <span class="label-full">Jogadores</span>
            <span class="label-short">Elenco</span>
          </button>
          <button id="clearField" type="button">
            <span class="label-full">Limpar</span>
            <span class="label-short">Limpar</span>
          </button>
          <button id="clearPositions" type="button" title="Remove jogadores das posições mas mantém o mesmo lineup">
            <span class="label-full">Limpar posições</span>
            <span class="label-short">L. Pos.</span>
          </button>
          <button id="resetLineup" type="button">
            <span class="label-full">Recarregar</span>
            <span class="label-short">Reset</span>
          </button>
          <button id="exportLineup" type="button">
            <span class="label-full">Exportar</span>
            <span class="label-short">Export.</span>
          </button>
          <button id="saveLineup" type="button" hidden>
            <span class="label-full">Salvar Line Up</span>
            <span class="label-short">Salvar</span>
          </button>
        </div>
      </section>

      <!-- Switcher de lineup por jogador -->
      <div id="lineupSwitcher" class="lineup-switcher" hidden></div>

      <!-- LINEUP TAB -->
      <section id="lineupTab" class="simulator" aria-label="Campo de baseball">
        <div class="field-wrap" aria-label="Campo de baseball com jogadores posicionados">
          <div class="field">
            <div class="grass-stripe stripe-one"></div>
            <div class="grass-stripe stripe-two"></div>
            <div class="grass-stripe stripe-three"></div>
            <div class="infield-skin"></div>
            <div class="foul-line foul-left"></div>
            <div class="foul-line foul-right"></div>
            <div class="base-path path-first"></div>
            <div class="base-path path-third"></div>
            <div class="outfield-arc"></div>
            <div class="infield-diamond"></div>
            <div class="mound" title="Pitcher"></div>
            <div class="base base-home" title="Home plate"></div>
            <div class="base base-first" title="Primeira base"></div>
            <div class="base base-second" title="Segunda base"></div>
            <div class="base base-third" title="Terceira base"></div>
            <div id="fieldSlots"></div>
          </div>
        </div>

        <aside id="lineupPanel" class="lineup-panel is-collapsed" aria-label="Selecionar jogadores e posicoes">
          <div class="panel-heading">
            <h2>Jogadores</h2>
            <span id="rosterCount">0 players</span>
            <button id="drawerClose" class="panel-close" type="button" aria-controls="lineupPanel">Fechar</button>
          </div>

          <div class="dh-mode" aria-label="Escolher modo de lineup">
            <button id="noDhMode" type="button" class="mode-button is-active">Sem DH</button>
            <button id="dhMode" type="button" class="mode-button">Com DH</button>
          </div>

          <div id="selectedPlayer" class="selected-player"></div>

          <div class="position-picker">
            <h3>Escolher posicao</h3>
            <div id="positionButtons" class="position-buttons"></div>
          </div>

          <div class="roster-search-wrap">
            <input
              id="rosterSearch"
              class="roster-search"
              type="search"
              placeholder="Buscar por nome ou camisa..."
              autocomplete="off"
            />
          </div>

          <div class="roster-controls">
            <button id="moveAllToBanco" type="button" class="roster-ctrl-btn" title="Mover todos os jogadores do Lineup para o Banco">⬇ Todos ao banco</button>
            <button id="addPlayerToggle" type="button" class="roster-ctrl-btn roster-ctrl-add">+ Jogador</button>
          </div>

          <div id="addPlayerPanel" class="add-player-panel" hidden>
            <div class="add-player-row">
              <input id="newPlayerName" type="text" placeholder="Nome" class="add-player-name-input" autocomplete="off" />
              <input id="newPlayerNumber" type="text" inputmode="numeric" placeholder="#" class="add-player-num-input" maxlength="3" autocomplete="off" />
            </div>
            <div class="add-player-tags-row">
              <span class="add-player-tags-label">Posições:</span>
              <div class="add-player-tags">
                <button type="button" class="pos-tag-btn" data-tag="P" title="Pitcher">P</button>
                <button type="button" class="pos-tag-btn" data-tag="C" title="Catcher">C</button>
                <button type="button" class="pos-tag-btn" data-tag="IF" title="Infield (1B, 2B, 3B, SS)">IF</button>
                <button type="button" class="pos-tag-btn" data-tag="OF" title="Outfield (LF, CF, RF)">OF</button>
                <button type="button" class="pos-tag-btn" data-tag="UT" title="Utility — pode jogar em várias posições">UT</button>
              </div>
            </div>
            <div class="add-player-submit-row">
              <button type="button" id="addPlayerSave" class="add-player-save-btn">Adicionar</button>
              <button type="button" id="addPlayerCancel" class="add-player-cancel-btn">Cancelar</button>
            </div>
          </div>

          <div id="playerRoster" class="player-roster"></div>
        </aside>
      </section>

    </main>

    <script src="lineup-data.js?v=5"></script>
    <script src="app.js?v=13"></script>
    <script src="lineup-sync.js?v=5"></script>
  </body>
</html>
